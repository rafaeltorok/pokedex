name: ESLint

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: '24'
      - name: Install dependencies        
        run: npm ci
      - name: Check style
        run: npm run eslint
