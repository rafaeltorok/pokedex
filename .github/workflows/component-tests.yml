name: Component tests

on:
  push:
    branches: [ main, testing ]
  pull_request:
    branches: [ main ]

jobs:
  component-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6        
        with:          
          node-version: '24'
      - name: Install dependencies        
        run: npm ci
      - name: Run tests
        run: npm run test
